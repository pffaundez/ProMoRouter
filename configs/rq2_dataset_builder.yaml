out_jsonl: "data/interaction_logs/rq2_train_smoke.jsonl"

seed: 0
split: "train"
n_per_task: 10          # smoke
max_units_per_query: 1  # por ahora monolithic; luego puedes subirlo si activas subqueries

endpoint: "http://localhost:18000/v1"
timeout_s: 120
temperature: 0.0
max_tokens: 256

lambda_cost: 0.00001
cost_proxy: "tokens_total"  # tokens_in + tokens_out

pools:
  models:
    - "mistralai/Mistral-7B-Instruct-v0.3"
  prompts:
    - "direct"
    - "cot"
    - "decompose"
    - "selfcheck"

tasks:
  hotpotqa:
    hf_path: "hotpot_qa"
    hf_name: "distractor"
    query_field: "question"
    gold_field: "answer"
    primary_metric: "f1"

  cs8mk:
    # si realmente es GSM8K/CS8K, aquí ajustamos al dataset que uses.
    # dejo gsm8k como default porque es el estándar más común.
    hf_path: "gsm8k"
    hf_name: "main"
    query_field: "question"
    gold_field: "answer"
    primary_metric: "accuracy"

  squad:
    hf_path: "squad"
    hf_name: null
    query_field: "question"
    context_field: "context"
    gold_field: "answers"   # SQuAD: answers.text[0]
    primary_metric: "f1"

  multinews:
    hf_path: "multi_news"
    hf_name: null
    query_field: "document"
    gold_field: "summary"
    primary_metric: "rougeL"

  alpaca:
    # para Alpaca usamos un dataset abierto tipo "tatsu-lab/alpaca"
    hf_path: "tatsu-lab/alpaca"
    hf_name: null
    query_field: "instruction"
    input_field: "input"
    gold_field: "output"
    primary_metric: "judge_score"  # por ahora se deja null si no hay juez

  humaneval:
    hf_path: "openai_humaneval"
    hf_name: null
    query_field: "prompt"
    gold_field: "test"
    entry_point_field: "entry_point"
    primary_metric: "pass_fail"  # por ahora null si no hay runner

