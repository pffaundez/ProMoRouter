dataset_name: "grpp_il_v1"

out_jsonl: "data/interaction_logs/grpp_il_v1/shards/train__qwen2.5-7b.jsonl"
endpoint: "http://localhost:18002/v1"

split: "train"
seed: 0
n_per_task: 5

timeout_s: 120
temperature: 0.0
max_tokens: 256

lambda_cost: 0.00001
cost_proxy: "tokens_total"

pools:
  models: ["qwen2.5-7b"]
  prompts:
    - "direct"
    - "cot"
    - "decompose"
    - "selfcheck"

tasks:
  hotpotqa:
    hf_path: "hotpot_qa"
    query_field: "question"
    gold_field: "answer"
    primary_metric: "f1"

  squad:
    hf_path: "squad"
    query_field: "question"
    gold_field: "answers"
    primary_metric: "f1"

  gsm8k:
    hf_path: "gsm8k"
    hf_name: "main"
    query_field: "question"
    gold_field: "answer"
    primary_metric: "acc"

  multinews:
    hf_path: "multi_news"
    query_field: "document"
    gold_field: "summary"
    primary_metric: "rougeL"