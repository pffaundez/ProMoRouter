dataset_name: "grpp_il_v1"

split: "train"
seed: 0
n_per_task: 5

timeout_s: 120
temperature: 0.0
max_tokens: 256

lambda_cost: 0.00001
cost_proxy: "tokens_total"

pools:
  prompts:
    - {id: "direct"}
    - {id: "cot"}
    - {id: "decompose"}
    - {id: "selfcheck"}

tasks:
  hotpotqa:
    hf_path: "hotpot_qa"
    query_field: "question"
    gold_field: "answer"
    primary_metric: "f1"

  squad:
    hf_path: "squad"
    query_field: "question"
    gold_field: "answers"
    primary_metric: "f1"

  gsm8k:
    hf_path: "gsm8k"
    hf_name: "main"
    query_field: "question"
    gold_field: "answer"
    primary_metric: "acc"

  multinews:
    hf_path: "multi_news"
    query_field: "document"
    gold_field: "summary"
    primary_metric: "rougeL"

  alpaca:
    hf_path: "tatsu-lab/alpaca"
    query_field: "instruction"
    input_field: "input"
    gold_field: "output"
    primary_metric: "judge"

  humaneval:
    hf_path: "openai_humaneval"
    query_field: "prompt"
    gold_field: "canonical_solution"
    primary_metric: "pass"