# MODIFIED FILE: configs/rq2_dataset_builder_full.yaml
# Canonical builder config for GRPP-IL v1 / GraphRouter++ paper experiments.
# This version matches the paper setup: 4 prompting strategies × 9 LLMs = 36 actions/query.

dataset_name: "grpp_il_v1"
out_jsonl: "data/interaction_logs/grpp_il_v1/train.jsonl"
split: "train"
seed: 0

# Scale controls
n_per_task: 5
max_units_per_query: 36

# Execution
endpoint: "http://localhost:18000/v1"
timeout_s: 120
temperature: 0.0
max_tokens: 128
model_context_limit: 512

# Logging + robustness
log_prompt_text: true
log_raw_response: true
truncate_fields:
  query_chars: 12000
  context_chars: 12000
  response_chars: 12000
  prompt_text_chars: 16000

# Decomposition: monolithic v1. The prompt strategy may request plan-and-solve,
# but the dataset builder does not split one query into multiple subqueries.
decomposition:
  enabled: false
  max_subqueries: 1
  splitter: "none"

# Cost definition
cost:
  mode: "priced_tokens"
  prices_from: "configs/llm_candidates.json"
  normalize_per_million: true
  cost_proxy: "tokens_total"

reward:
  enabled: true
  lambda_cost: 0.00001
  form: "performance_minus_lambda_cost"

# Pools: paper-consistent 9-model pool. mixtral-8x22b remains in llm_candidates.json
# as an available model, but it is not part of the reported GraphRouter++ setup.
pools:
  models:
    - "mistral-7b"
    - "qwen2.5-7b"
    - "llama3.1-8b"
    - "qwen2.5-14b"
    - "yi-34b"
    - "codellama-34b"
    - "mixtral-8x7b"
    - "llama3.1-70b"
    - "qwen2.5-72b"
  prompts:
    - "direct"
    - "cot"
    - "decompose"
    - "selfcheck"

actions:
  mode: "cartesian_then_cap"
  sampling:
    enabled: false
    method: "uniform"
    ensure_coverage:
      prompts: true
      models: true

tasks:
  hotpotqa:
    hf_path: "hotpot_qa"
    hf_name: "distractor"
    query_field: "question"
    gold_field: "answer"
    primary_metric: "f1"
    metric_name: "F1"
    eval_mode: "auto"

  gsm8k:
    hf_path: "gsm8k"
    hf_name: "main"
    query_field: "question"
    gold_field: "answer"
    primary_metric: "accuracy"
    metric_name: "accuracy"
    eval_mode: "auto"
    answer_extraction: "gsm8k_final_number"

  squad:
    hf_path: "squad"
    hf_name: null
    query_field: "question"
    context_field: "context"
    gold_field: "answers"
    primary_metric: "f1"
    metric_name: "F1"
    eval_mode: "auto"
    answer_extraction: "squad_span"

  alpaca:
    hf_path: "tatsu-lab/alpaca"
    hf_name: null
    query_field: "instruction"
    input_field: "input"
    gold_field: "output"
    primary_metric: "f1"
    metric_name: "F1"
    eval_mode: "auto"

output_fields:
  - task
  - qid
  - query
  - subquery
  - is_decomposed
  - subquery_id
  - num_subqueries
  - prompt
  - prompt_text
  - model
  - model_backend
  - response
  - parsed_answer
  - performance
  - metric_name
  - cost
  - input_tokens
  - output_tokens
  - latency_s
  - timestamp
  - seed
  - status
  - error_msg
